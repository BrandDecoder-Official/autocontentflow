<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandDecoder V9 | Agent Funnel Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; }
        .agent-chat-container { height: calc(100vh - 80px); }
        /* 💡 模仿高級 Agent 的流動感 */
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .locked-input { cursor: not-allowed; opacity: 0.5; }
        .typing-dot { animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="text-slate-200 overflow-hidden">

    <aside id="sidebar" class="fixed left-0 top-0 h-full w-16 hover:w-64 glass-panel z-50 transition-all duration-300 overflow-hidden group">
        <div class="flex flex-col h-full p-4">
            <div class="mb-10 text-xl font-black text-blue-500">BD</div>
            <nav class="flex-grow space-y-8">
                <button onclick="openCharacterLib()" class="flex items-center gap-4 hover:text-blue-400 transition-colors">
                    <span>🧬</span><span class="opacity-0 group-hover:opacity-100 font-bold">專屬角色庫</span>
                </button>
                <button class="flex items-center gap-4 hover:text-blue-400 transition-colors">
                    <span>⚙️</span><span class="opacity-0 group-hover:opacity-100 font-bold">系統設定</span>
                </button>
            </nav>
            <button class="flex items-center gap-4 text-red-400 hover:text-red-300">
                <span>🚪</span><span class="opacity-0 group-hover:opacity-100 font-bold">登出系統</span>
            </button>
        </div>
    </aside>

    <main class="ml-16 h-screen flex flex-col relative">
        
        <header class="h-16 flex items-center justify-between px-8 border-b border-white/10 glass-panel">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                <span class="text-sm font-black tracking-widest text-slate-400">MISSION STATUS: <span id="flowStepName" class="text-white">INITIALIZING</span></span>
            </div>
            <div id="pointsBadge" class="bg-slate-800 px-3 py-1 rounded-full text-xs border border-slate-600">
                ⚡ 算力點數: <span id="userPoints" class="font-bold text-yellow-400">---</span>
            </div>
        </header>

        <section id="funnelLog" class="flex-grow overflow-y-auto p-6 space-y-6 scroll-smooth agent-chat-container">
            </section>

        <footer class="p-6 glass-panel">
            <div class="max-w-4xl mx-auto relative">
                <input type="text" id="agentInput" 
                    class="w-full bg-slate-900/50 border border-white/20 rounded-2xl py-4 px-6 pr-16 focus:outline-none focus:ring-2 focus:ring-blue-500/50 locked-input transition-all"
                    placeholder="等待指令中..." disabled>
                <button id="btnSend" class="absolute right-3 top-3 p-2 bg-blue-600 rounded-xl opacity-50 cursor-not-allowed transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
        </div>

    </main>

    <script type="module">
        // 🌟 這裡將會是我們新版的 FlowController
        import { initAgentFunnel } from './js/agent_v9_core.js';
        window.onload = () => initAgentFunnel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder V9 | Agent Funnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; overscroll-behavior: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .agent-chat-area { height: calc(100vh - 160px); }
        .input-locked { background-color: #1e293b !important; cursor: not-allowed; opacity: 0.6; }
        .input-active { background-color: #0f172a !important; border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        
        /* 自定義捲動條 */
        #funnelLog::-webkit-scrollbar { width: 4px; }
        #funnelLog::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* 動態組件動畫 */
        .skill-card { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-slate-200 overflow-hidden">

    <button onclick="toggleSidebar()" class="lg:hidden fixed top-4 left-4 z-[60] p-2 bg-slate-800 rounded-lg border border-white/20 shadow-xl">
        <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
    </button>

    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden transition-opacity"></div>
    
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 lg:w-20 lg:hover:w-64 glass-panel z-50 transition-all duration-300 -translate-x-full lg:translate-x-0 group overflow-hidden">
        <div class="flex flex-col h-full">
            <div class="p-6 mb-4 flex items-center justify-between">
                <div class="text-2xl font-black text-blue-500 tracking-tighter">BD <span class="text-[10px] text-slate-500 align-top">V9</span></div>
                <button onclick="toggleSidebar()" class="lg:hidden text-slate-400">✕</button>
            </div>
            
            <nav class="flex-grow px-4 space-y-4">
                <button onclick="alert('開啟角色庫')" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 transition-all text-slate-400 hover:text-blue-400">
                    <span class="text-xl">🧬</span><span class="lg:opacity-0 lg:group-hover:opacity-100 font-bold whitespace-nowrap">角色基因庫</span>
                </button>
                <button class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 transition-all text-slate-400 hover:text-blue-400">
                    <span class="text-xl">⚙️</span><span class="lg:opacity-0 lg:group-hover:opacity-100 font-bold whitespace-nowrap">系統設定</span>
                </button>
            </nav>

            <div class="p-4 border-t border-white/5">
                <button class="w-full flex items-center gap-4 p-3 text-red-400 hover:bg-red-500/10 rounded-xl transition-all">
                    <span class="text-xl">🚪</span><span class="lg:opacity-0 lg:group-hover:opacity-100 font-bold">登出</span>
                </button>
            </div>
        </div>
    </aside>

    <main class="lg:ml-20 h-screen flex flex-col relative transition-all duration-300">
        
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-slate-900/40">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
                <h1 id="missionStep" class="text-[10px] font-black tracking-[0.2em] text-slate-500 uppercase">System Initializing...</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-[10px] font-bold bg-slate-800 px-3 py-1 rounded-full border border-white/10">
                    ⚡ <span id="userPoints" class="text-yellow-400">---</span> PTS
                </div>
            </div>
        </header>

        <section id="funnelLog" class="flex-grow overflow-y-auto p-4 lg:p-8 space-y-6 agent-chat-area">
            </section>

        <footer class="p-4 lg:p-6 border-t border-white/5 bg-slate-900/60 backdrop-blur-md">
            <div class="max-w-4xl mx-auto flex items-end gap-3">
                <div class="flex-grow relative">
                    <textarea id="agentInput" 
                        class="w-full bg-slate-800/50 border border-white/10 rounded-2xl py-4 px-5 pr-12 focus:outline-none resize-none transition-all input-locked text-sm"
                        placeholder="請遵循代理人引導..." rows="1" disabled></textarea>
                </div>
                <button id="btnSend" class="p-4 bg-blue-600 rounded-2xl text-white opacity-50 cursor-not-allowed hover:bg-blue-500 transition-all shadow-lg shadow-blue-900/20" disabled>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </footer>

    </main>

    <script type="module">
        import { initAgentFunnel } from './js/agent_v9_core.js';
        
        // 全域手機側欄切換
        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        };

        window.onload = () => initAgentFunnel();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder V9 | V0.26 數據貫通版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/timepicker-ui@2.6.1/dist/timepicker-ui.umd.js"></script>

    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; overscroll-behavior: none; }
        .glass-panel { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .agent-chat-area { height: calc(100dvh - 64px); padding-bottom: 2rem; } 
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (max-width: 1024px) {
            .mobile-bottom-sheet { align-items: flex-end !important; }
            .mobile-bottom-sheet > div { border-radius: 24px 24px 0 0 !important; max-height: 90dvh; transform: translateY(100%); transition: transform 0.3s ease-out; }
            .mobile-bottom-sheet.show > div { transform: translateY(0); }
            .skill-card { margin-left: 1.5rem !important; margin-right: 0 !important; }
        }
        .hide-minute-tick { opacity: 0 !important; pointer-events: none !important; }
        .char-card-selected { ring: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.2); }
        input[type="checkbox"] { width: 1rem; height: 1rem; border-radius: 0.25rem; background-color: #1e293b; border: 1px solid #475569; appearance: none; -webkit-appearance: none; outline: none; cursor: pointer; position: relative; }
        input[type="checkbox"]:checked { background-color: #0ea5e9; border-color: #0ea5e9; }
        input[type="checkbox"]:checked::after { content: "✓"; position: absolute; color: white; font-size: 10px; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #loginGate { transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .gate-hidden { opacity: 0; pointer-events: none; transform: scale(1.05); }
        
        /* 載入中的旋轉動畫 */
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top-color: #3b82f6; border-radius: 50%; width: 1.5rem; height: 1.5rem; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-200 overflow-hidden relative">

    <div id="loginGate" class="fixed inset-0 z-[200] bg-slate-900 flex flex-col items-center justify-center p-6 backdrop-blur-3xl">
        <div class="w-full max-w-md bg-slate-800/80 border border-slate-600/50 rounded-3xl p-8 lg:p-12 shadow-2xl flex flex-col items-center text-center relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-blue-500 rounded-full blur-[80px] opacity-30"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-500 rounded-full blur-[80px] opacity-30"></div>
            <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white text-3xl shadow-lg mb-6 z-10">BD</div>
            <h1 class="text-2xl font-black text-white mb-2 z-10">BrandDecoder V9</h1>
            <p class="text-sm text-slate-400 mb-8 z-10">企業級自動發文與視覺編撰系統</p>
            <div id="loginStatusArea" class="w-full min-h-[50px] mb-6 z-10 flex flex-col items-center justify-center"><div id="google-btn-container"></div></div>
        </div>
    </div>

    <aside id="sidebar" class="fixed left-0 top-0 h-[100dvh] w-72 lg:w-20 lg:hover:w-72 glass-panel z-50 transition-all duration-300 -translate-x-full lg:translate-x-0 group overflow-hidden flex flex-col shadow-2xl justify-between">
        <div>
            <div class="p-4 border-b border-white/5 bg-slate-900/50">
                <div class="flex items-center gap-3 w-full cursor-pointer hover:bg-white/5 p-2 rounded-xl transition-colors">
                    <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white text-lg flex-shrink-0 shadow-lg">BD</div>
                    <div class="lg:opacity-0 lg:group-hover:opacity-100 transition-opacity overflow-hidden whitespace-nowrap"><p class="text-xs font-black text-white">BrandDecoder 官方</p><p class="text-[10px] text-blue-400">目前運作工作區</p></div>
                </div>
            </div>
            <nav class="px-3 py-4 space-y-2">
                <button onclick="window.openSystemSettings()" class="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-white/5 transition-all text-slate-400 hover:text-white group/btn">
                    <span class="text-2xl group-hover/btn:scale-110 transition-transform">⚙️</span><span class="lg:opacity-0 lg:group-hover:opacity-100 font-bold whitespace-nowrap">系統與營運中樞</span>
                </button>
            </nav>
        </div>
        <div class="p-4 border-t border-white/5 bg-slate-900/80">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-700 border border-white/10 overflow-hidden flex-shrink-0"><img id="sidebarAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=User" class="w-full h-full object-cover"></div>
                <div class="lg:opacity-0 lg:group-hover:opacity-100 transition-opacity overflow-hidden"><p class="text-xs font-bold text-white truncate" id="sidebarUserName">載入中...</p><p class="text-[9px] text-slate-400 truncate mt-0.5" id="sidebarUserEmail">---</p></div>
            </div>
            <button onclick="window.handleLogout()" class="mt-3 w-full flex items-center gap-4 p-2 text-red-400 hover:bg-red-500/10 rounded-xl transition-all"><span class="text-lg">🚪</span><span class="lg:opacity-0 lg:group-hover:opacity-100 font-bold text-xs">登出</span></button>
        </div>
    </aside>

    <button onclick="toggleSidebar()" class="lg:hidden fixed top-4 left-4 z-[60] p-2 bg-slate-800 rounded-lg border border-white/20 shadow-xl"><svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg></button>
    <div id="sidebarOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden transition-opacity"></div>

    <main class="lg:ml-20 h-[100dvh] flex flex-col relative transition-all duration-300">
        <header class="h-16 flex items-center justify-between px-4 lg:px-6 border-b border-white/5 bg-slate-900/40 backdrop-blur-md z-10 flex-shrink-0">
            <div class="flex items-center gap-2 lg:gap-3 ml-12 lg:ml-0">
                <div class="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_10px_#22c55e] animate-pulse"></div>
                <h1 id="missionStep" class="text-[10px] font-black tracking-[0.2em] text-slate-400 uppercase">SYSTEM READY</h1>
            </div>
            <div class="text-[10px] font-bold bg-slate-800 px-3 py-1.5 rounded-full border border-white/10 cursor-pointer hover:bg-slate-700 transition-colors flex items-center gap-1" onclick="window.openSystemSettings()">
                ⚡ <span id="userPoints" class="text-yellow-400 text-xs transition-all duration-500">---</span> PTS
            </div>
        </header>
        <section id="funnelLog" class="flex-grow overflow-y-auto p-2 lg:p-8 agent-chat-area relative"></section>
    </main>

    <div id="scheduleModal" class="mobile-bottom-sheet fixed inset-0 z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeScheduleModal()"></div>
        <div class="relative w-full max-w-md bg-slate-800 border border-indigo-500/30 rounded-3xl shadow-2xl p-6" id="schedulePanel"></div>
    </div>

    <div id="systemSettingsModal" class="mobile-bottom-sheet fixed inset-0 z-[100] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeSystemSettings()"></div>
        <div class="relative w-full max-w-2xl bg-slate-800 border border-slate-600 rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90dvh]" id="settingsPanel">
            <div class="flex justify-between items-center p-5 lg:p-6 border-b border-white/10 bg-slate-900/50 flex-shrink-0">
                <div class="flex items-center gap-3"><span class="text-2xl lg:text-3xl">⚙️</span><div><h2 class="text-base lg:text-lg font-black text-slate-200 uppercase">System Hub</h2><p class="text-[10px] text-slate-400">營運、金流與紀錄管理</p></div></div>
                <button onclick="closeSystemSettings()" class="text-slate-400 hover:text-white p-2 bg-slate-800 rounded-full hover:bg-red-500 transition-colors">✕</button>
            </div>
            <div class="p-5 lg:p-6 overflow-y-auto flex-grow space-y-6">
                <div class="bg-slate-900/50 rounded-2xl p-5 border border-indigo-500/30 relative overflow-hidden">
                    <div class="absolute top-0 right-0 bg-indigo-600 text-[10px] font-bold px-2 py-1 rounded-bl-lg">目前運作區</div>
                    <p class="text-xs text-indigo-400 font-black mb-4 tracking-widest uppercase">🎭 品牌與人設管理</p>
                    <div class="flex items-center justify-between bg-slate-800 p-4 rounded-xl border border-indigo-500/50 mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center font-black text-white">BD</div>
                            <div><p class="text-sm font-bold text-white">專屬基因庫</p><p class="text-[10px] text-slate-400" id="charCountLabel">已擁有 0 組角色模型</p></div>
                        </div>
                        <button onclick="window.openCharManager()" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg transition-colors font-bold shadow-lg">管理基因庫</button>
                    </div>
                </div>
                <div class="bg-slate-900/50 rounded-2xl p-5 border border-white/5">
                    <div class="flex justify-between items-center mb-4"><p class="text-xs text-slate-400 font-black tracking-widest uppercase">📜 算力消耗軌跡</p><button onclick="window.refreshAuditLogs()" class="text-xs text-blue-400 hover:text-white">↻ 重整</button></div>
                    <div class="space-y-2 max-h-40 overflow-y-auto no-scrollbar" id="auditLogsContainer">
                        <div class="text-center text-xs text-slate-500 py-4">載入紀錄中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="charManageModal" class="mobile-bottom-sheet fixed inset-0 z-[110] hidden items-center justify-center opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 bg-slate-900/90 backdrop-blur-md" onclick="window.closeCharManager()"></div>
        <div class="relative w-full max-w-3xl bg-slate-800 border border-indigo-500/50 rounded-3xl shadow-2xl overflow-hidden flex flex-col max-h-[90dvh]">
            <div class="flex justify-between items-center p-5 border-b border-white/10 bg-slate-900/80 flex-shrink-0">
                <div class="flex items-center gap-3"><span class="text-2xl">🧬</span><div><h2 class="text-base font-black text-white uppercase">專屬角色基因庫</h2><p class="text-[10px] text-slate-400">管理您的 AI 視覺分身 (上限 10 名)</p></div></div>
                <button onclick="window.closeCharManager()" class="text-slate-400 hover:text-white p-2 bg-slate-800 rounded-full">✕</button>
            </div>
            
            <div class="p-5 overflow-y-auto flex-grow bg-slate-900/30 relative">
    <div id="charGridContainer" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6"></div>
    
                <div id="newCharForm" class="hidden bg-slate-800 p-5 rounded-2xl border border-indigo-500/30 animate-fade-in">
                    <h3 class="text-xs font-black text-indigo-400 uppercase mb-4">✨ 註冊新視覺基因</h3>
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="w-full md:w-1/3 flex flex-col gap-2">
                            <div id="charPreviewBox" class="w-full aspect-square bg-slate-900 rounded-xl border-2 border-dashed border-slate-600 flex items-center justify-center cursor-pointer hover:border-indigo-500 overflow-hidden relative" onclick="document.getElementById('charFileInput').click()">
                                <div class="text-center p-4" id="charPreviewEmpty"><span class="text-2xl block mb-1">📸</span><span class="text-[10px] text-slate-400">點擊上傳清晰的半身照</span></div>
                                <img id="charPreviewImg" class="w-full h-full object-cover hidden">
                            </div>
                            <input type="file" id="charFileInput" accept="image/*" class="hidden" onchange="window.handleCharPhotoSelect(event)">
                        </div>
                        
                        <div class="w-full md:w-2/3 space-y-3 flex flex-col justify-center">
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="newCharName" placeholder="角色代號" class="bg-slate-900 border border-white/10 rounded-xl p-3 text-sm text-white focus:border-indigo-500 focus:outline-none">
                                <select id="newCharType" class="bg-slate-900 border border-white/10 rounded-xl p-3 text-sm text-white focus:border-indigo-500 focus:outline-none">
                                    <option value="REALISTIC">📷 真實攝影</option>
                                    <option value="COMIC" selected>🎨 2D 動漫</option>
                                </select>
                            </div>
                            <input type="text" id="newCharPersona" placeholder="補充設定 (選填)" class="w-full bg-slate-900 border border-white/10 rounded-xl p-3 text-sm text-white focus:border-indigo-500 focus:outline-none">
                            
                            <div class="flex gap-2 pt-2">
                                <button onclick="window.cancelNewChar()" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white py-2.5 rounded-xl text-xs font-bold transition-all">取消</button>
                                <button id="btnSubmitNewChar" onclick="window.submitNewChar()" class="flex-[2] bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-xl text-xs font-black shadow-lg shadow-indigo-500/20 transition-all flex justify-center items-center gap-2">上傳並萃取基因</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-4 border-t border-white/10 bg-slate-900/80 flex-shrink-0 flex justify-center" id="btnAddNewCharContainer">
                <button onclick="window.openNewCharForm()" class="bg-slate-800 hover:bg-slate-700 border border-white/10 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg transition-all w-full max-w-sm flex justify-center items-center gap-2"><span class="text-lg">+</span> 註冊新角色</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { CONFIG, STATE } from './js/config.js';
        import * as API from './js/api.js';
        import { initAgentFunnel, bootSystemData } from './js/agent_v9_core.js';

        // JWT 解碼
        function parseJwt(token) {
            try { return JSON.parse(decodeURIComponent(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))); } catch(e) { return null; }
        }

        const statusArea = document.getElementById('loginStatusArea');
        const googleBtnContainer = document.getElementById('google-btn-container');

        async function activateSystem(apiResult, credential) {
            const payload = parseJwt(credential);
            STATE.globalAuthToken = credential; STATE.uid = apiResult.uid; STATE.userPoints = apiResult.totalPoints || 0;
            localStorage.setItem('bd_v9_token', credential);

            document.getElementById('sidebarUserName').innerText = payload?.name || 'SaaS User';
            document.getElementById('sidebarUserEmail').innerText = payload?.email || 'admin@branddecoder.com';
            if (payload?.picture) document.getElementById('sidebarAvatar').src = payload.picture;
            document.getElementById('userPoints').innerText = STATE.userPoints.toLocaleString();

            statusArea.innerHTML = `<div class="text-sm font-bold text-green-400">✅ 驗證成功，正在同步雲端資料庫...</div>`;
            
            // 🌟 V0.26: 啟動前先抓取全域 DB 資料 (風格、角色)
            await bootSystemData();
            
            setTimeout(() => { document.getElementById('loginGate').classList.add('gate-hidden'); initAgentFunnel(); }, 600);
        }

        async function processLoginValidation(credential) {
            try {
                const result = await API.verifyLoginAPI(credential);
                if (result.success && result.status === 'ACTIVE') { await activateSystem(result, credential); } 
                else if (result.success && result.status === 'PENDING') { statusArea.innerHTML = `<div class="bg-orange-500/20 border border-orange-500 text-orange-400 p-4 rounded-xl text-xs font-bold w-full"><p class="text-base mb-1">⏳ 帳號審核中</p>${result.message}</div>`; googleBtnContainer.style.display = 'none'; } 
                else { throw new Error(result.message || '驗證失敗'); }
            } catch (error) { statusArea.innerHTML = `<div class="text-xs font-bold text-red-400 bg-red-500/20 p-3 rounded-lg w-full">❌ ${error.message}</div>`; localStorage.removeItem('bd_v9_token'); setTimeout(() => { location.reload(); }, 3000); }
        }

        async function handleCredentialResponse(response) { googleBtnContainer.style.display = 'none'; statusArea.innerHTML = `<div class="animate-pulse text-sm font-bold text-blue-400">🔄 正在與雲端安全驗證...</div>`; await processLoginValidation(response.credential); }
        window.handleLogout = function() { localStorage.removeItem('bd_v9_token'); STATE.globalAuthToken = null; location.reload(); };

        window.onload = async function () {
            const savedToken = localStorage.getItem('bd_v9_token');
            if (savedToken) { googleBtnContainer.style.display = 'none'; statusArea.innerHTML = `<div class="animate-pulse text-sm font-bold text-indigo-400">⚡ 偵測到登入憑證，正在恢復連線...</div>`; await processLoginValidation(savedToken); } 
            else { google.accounts.id.initialize({ client_id: CONFIG.GOOGLE_CLIENT_ID, callback: handleCredentialResponse }); google.accounts.id.renderButton(googleBtnContainer, { theme: "filled_black", size: "large", shape: "pill", width: 250 }); }
        };

        // UI Toggles
        window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); document.getElementById('sidebarOverlay').classList.toggle('hidden'); };
        window.closeScheduleModal = function() { const modal = document.getElementById('scheduleModal'); modal.classList.remove('show'); setTimeout(() => { modal.classList.add('hidden'); }, 300); };
        window.openSystemSettings = function() { 
            const modal = document.getElementById('systemSettingsModal'); modal.classList.remove('hidden'); 
            setTimeout(() => { modal.classList.add('show'); modal.classList.remove('opacity-0'); }, 10); 
            window.refreshAuditLogs(); // 打開時順便抓 Log
        };
        window.closeSystemSettings = function() { const modal = document.getElementById('systemSettingsModal'); modal.classList.remove('show'); setTimeout(() => { modal.classList.add('hidden'); }, 300); };
    </script>
</body>
</html>

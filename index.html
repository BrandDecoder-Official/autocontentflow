<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandDecoder | 行動工作室 V8.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; padding-bottom: 100px; /* 留給底部浮動按鈕空間 */ }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .mode-active { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .char-item { border: 1px solid #e5e7eb; padding: 16px; border-radius: 12px; margin-bottom: 12px; background: #ffffff; }
        /* 行動版底部浮動操作區 */
        .sticky-bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #e5e7eb; padding: 16px; z-index: 40; box-shadow: 0 -4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center pt-8 px-4">

    <div id="loginScreen" class="w-full max-w-md mt-20 flex flex-col items-center glass-card p-10 rounded-3xl shadow-xl border border-gray-200 transition-all duration-500">
        <div class="text-6xl mb-4">🤖</div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">系統登入</h1>
        <p class="text-gray-500 mb-8 text-center font-medium">BrandDecoder 行動工作室</p>
        <div id="googleButtonDiv"></div>
    </div>

    <div id="mainApp" class="w-full max-w-3xl hidden transition-all duration-500 opacity-0 relative">
        
        <div id="step1-setup" class="space-y-6 animate-fade-in">
            <div class="w-full text-center mb-6">
                <h1 class="text-3xl font-black text-gray-900 tracking-tight">🚀 BrandDecoder <span class="text-blue-600">V8.1</span></h1>
                <p class="text-gray-500 font-medium text-sm mt-1">微網紅行動工作室 ✕ 網頁閉環審核</p>
            </div>

            <form id="agentForm" class="w-full space-y-5">
                <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-5">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">🎯 目標平台</label>
                            <select id="platform" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl p-3 font-medium cursor-pointer">
                                <option value="FB_IG" selected>🌐 FB + IG 雙平台</option>
                                <option value="THREADS">🧵 Threads</option>
                                <option value="FB">📘 Facebook</option>
                                <option value="IG">📸 Instagram</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-700 mb-1">✍️ 輸入主題 (例如：在海底撈遇到老闆)</label>
                            <textarea id="topic" rows="3" class="block p-3 w-full text-gray-900 bg-white rounded-xl border border-gray-300 focus:ring-blue-500 focus:border-blue-500 font-medium resize-none shadow-inner"></textarea>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-5">
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <div id="btnComicMode" class="mode-active border-2 border-gray-200 rounded-xl p-3 cursor-pointer text-center transition-all" onclick="switchMode(true)">
                            <div class="text-2xl mb-1">🦸‍♂️</div>
                            <div class="font-bold text-gray-800 text-sm">動漫宇宙</div>
                        </div>
                        <div id="btnStandardMode" class="border-2 border-gray-200 rounded-xl p-3 cursor-pointer text-center transition-all" onclick="switchMode(false)">
                            <div class="text-2xl mb-1">📸</div>
                            <div class="font-bold text-gray-800 text-sm">真實攝影</div>
                        </div>
                    </div>
                    <div class="space-y-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 mb-1">🎨 畫風</label>
                            <select id="comicStyleSelect" class="w-full bg-white border border-gray-300 text-gray-900 rounded-lg p-2.5 font-medium text-sm cursor-pointer">
                                <option value="TORIYAMA_HUMOR" selected>🥚 鳥山明爆笑風</option>
                                <option value="GHIBLI">🍃 吉卜力溫馨風</option>
                                <option value="RETRO_HOKUTO_BW">⬛ 世紀末硬派風</option>
                                <option value="REALISTIC" id="styleRealistic" class="hidden">📸 真實商業攝影</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">📐 比例</label>
                                <select id="aspectRatioSelect" class="w-full bg-white border border-gray-300 rounded-lg p-2.5 font-medium text-sm cursor-pointer">
                                    <option value="1:1" selected>1:1 (正方)</option>
                                    <option value="16:9">16:9 (橫式)</option>
                                    <option value="9:16">9:16 (直式)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 mb-1">🔍 解析度</label>
                                <select id="resolutionSelect" class="w-full bg-white border border-gray-300 rounded-lg p-2.5 font-medium text-sm cursor-pointer">
                                    <option value="512">512px</option>
                                    <option value="1K" selected>1K (標準)</option>
                                    <option value="2K">2K (高清)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="characterSection" class="glass-card rounded-2xl shadow-sm border border-gray-200 p-5">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-md font-bold text-gray-800 flex items-center">
                            <span class="mr-2">👥</span> 登場人物 (最多4人)
                        </h2>
                        <button type="button" onclick="addCharacterSlot()" class="text-blue-600 text-sm font-bold bg-blue-50 px-3 py-1 rounded-lg hover:bg-blue-100 transition-colors">+ 新增角色</button>
                    </div>
                    <div id="characterList" class="space-y-3"></div>
                </div>

                <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-5">
                    <h2 class="text-md font-bold text-gray-800 mb-2 flex items-center">
                        <span class="mr-2">🖼️</span> 現場/商品參考圖 (最多10張)
                    </h2>
                    <input type="file" id="referenceImagesInput" accept="image/png, image/jpeg, image/webp" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-blue-50 file:text-blue-700 bg-white border border-gray-200 rounded-xl p-1 cursor-pointer">
                </div>

                <div class="sticky-bottom-bar animate-slide-up">
                    <button type="submit" id="btnStep1Submit" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-black rounded-xl text-lg px-5 py-4 text-center shadow-lg transition-all flex justify-center items-center">
                        <span id="btnTextStep1">⚡ 1️⃣ 第一步：AI 撰寫貼文腳本</span>
                    </button>
                </div>
            </form>
        </div>

        <div id="step2-review" class="hidden space-y-6 animate-fade-in pb-10">
            <div class="bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-5 shadow-inner">
                <h2 class="text-xl font-black text-yellow-800 mb-2 flex items-center">
                    <span class="mr-2">💡</span> 步驟二：審核與修改腳本
                </h2>
                <p class="text-xs text-yellow-700 mb-4 font-medium">大腦已經寫好貼文與分鏡了！您可以直接在下方點擊修改文字。確認台詞無誤後再發包生圖，確保文字精準鎖定在圖上。</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">社群貼文內容 (請加上 Hashtag)</label>
                        <textarea id="reviewCaption" rows="4" class="w-full p-3 bg-white border-2 border-gray-300 rounded-xl font-medium focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-inner"></textarea>
                    </div>
                    
                    <div id="reviewPanelsContainer" class="space-y-3 hidden">
                        <label class="block text-sm font-bold text-gray-700 mb-1">漫畫分鏡台詞 (將精密渲染於圖上)</label>
                        </div>
                </div>
            </div>

            <div class="sticky-bottom-bar flex gap-3 animate-slide-up">
                <button type="button" onclick="backToStep1()" class="w-1/3 text-gray-700 bg-gray-200 font-bold rounded-xl text-md px-4 py-4 hover:bg-gray-300 transition-all">返回修改</button>
                <button type="button" id="btnStep2Submit" onclick="submitForImageGeneration()" class="w-2/3 text-white bg-indigo-600 hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-300 font-black rounded-xl text-lg px-4 py-4 shadow-lg transition-all">
                    <span id="btnTextStep2">🎨 2️⃣ 第二步：發包生成圖片</span>
                </button>
            </div>
        </div>

        <div id="step3-publish" class="hidden space-y-6 animate-fade-in pb-10">
            <div class="glass-card rounded-2xl p-5 shadow-sm border border-gray-200 text-center">
                <h2 class="text-xl font-black text-green-700 mb-4 flex items-center justify-center">
                    <span class="mr-2">🎉</span> 步驟三：圖文準備就緒！
                </h2>
                
                <div id="finalImageContainer" class="w-full bg-gray-100 rounded-xl overflow-hidden mb-4 border-2 border-gray-200 min-h-[300px] flex items-center justify-center shadow-inner">
                    <span class="text-gray-400 font-medium">圖片載入中...</span>
                </div>

                <div class="text-left bg-gray-50 p-4 rounded-xl border border-gray-200 text-sm font-medium text-gray-700 shadow-inner">
                    <p id="finalCaptionDisplay">貼文預覽...</p>
                </div>
            </div>

            <div class="sticky-bottom-bar flex gap-3 animate-slide-up">
                <button type="button" id="btnRegenerate" onclick="submitForImageGeneration()" class="w-1/3 text-gray-700 bg-gray-200 font-bold rounded-xl text-xs px-2 py-4 hover:bg-gray-300 transition-all">🔄 換個姿勢重新生圖</button>
                <button type="button" id="btnPublish" onclick="publishToSocial()" class="w-2/3 text-white bg-green-600 hover:bg-green-700 focus:ring-4 focus:ring-green-300 font-black rounded-xl text-lg px-4 py-4 shadow-lg flex justify-center items-center transition-all">
                    🚀 3️⃣ 確認無誤，一鍵發射至社群
                </button>
            </div>
        </div>

    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center z-50 text-sm whitespace-nowrap">
        <span id="toastMsg">系統訊息</span>
    </div>

    <script>
        // 🌟 請把這個網址換成你部署成功的 Cloud Run URL (V8.1)
        const CLOUD_RUN_URL = 'https://bd-autocontentflow-217800246535.asia-east1.run.app';
        let isComicModeActive = true; 
        let globalAuthToken = ''; 
        let currentTaskId = ''; // 🌟 用來追蹤目前的任務 ID，在三步驟中流轉

        // 登入驗證
        function handleCredentialResponse(response) {
            globalAuthToken = response.credential;
            document.getElementById('loginScreen').classList.add('hidden');
            const mainApp = document.getElementById('mainApp');
            mainApp.classList.remove('hidden');
            setTimeout(() => { mainApp.classList.remove('opacity-0'); }, 100);
            showToast('✅ 登入成功！工廠引擎已發動。', 'success');
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "217800246535-tuc0olph401jjipa5hm34hq45h9jlq7j.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(document.getElementById("googleButtonDiv"),{ theme: "outline", size: "large", width: 300, shape: "pill" });
            // 初始化老K
            addCharacterSlot("老K", "聰明、科技總編", true);
        };

        // UI 切換邏輯
        function switchMode(toComic) {
            isComicModeActive = toComic;
            const btnStandard = document.getElementById('btnStandardMode');
            const btnComic = document.getElementById('btnComicMode');
            const charSection = document.getElementById('characterSection');
            const styleSelect = document.getElementById('comicStyleSelect');
            const styleRealistic = document.getElementById('styleRealistic');

            if (toComic) {
                btnComic.classList.add('mode-active');
                btnStandard.classList.remove('mode-active');
                charSection.classList.remove('hidden');
                styleRealistic.classList.add('hidden'); 
                if (styleSelect.value === 'REALISTIC') styleSelect.value = 'TORIYAMA_HUMOR';
            } else {
                btnStandard.classList.add('mode-active');
                btnComic.classList.remove('mode-active');
                charSection.classList.add('hidden'); 
                styleRealistic.classList.remove('hidden'); 
                styleSelect.value = 'REALISTIC'; 
            }
        }

        function addCharacterSlot(name = "", personality = "") {
            const list = document.getElementById('characterList');
            if (list.children.length >= 4) { alert("⚠️ 最多4張角色圖"); return; }
            const charCard = document.createElement('div');
            charCard.className = 'char-item relative animate-fade-in shadow-sm';
            charCard.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-3 text-gray-400 font-bold text-lg hover:text-red-500">✕</button>
                <div class="space-y-2">
                    <input type="text" name="charName" value="${name}" placeholder="本名(必填，例：瓜哥)" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 font-bold focus:ring-blue-500 focus:border-blue-500 text-sm" required>
                    <input type="file" name="charAvatar" accept="image/png, image/jpeg" class="block w-full text-xs text-blue-700 bg-blue-50 border border-blue-200 rounded-lg p-1 cursor-pointer">
                </div>
            `;
            list.appendChild(charCard);
        }

        async function processFileToBase64(file) {
            if (!file || file.size === 0) return null;
            if (file.size > 512 * 1024) { alert(`❌ 圖片超過 512KB，已忽略`); return null; }
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ mimeType: file.type, data: reader.result.split(',')[1] });
                reader.onerror = e => reject(e);
            });
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#3b82f6');
            toast.classList.remove('-translate-y-20', 'opacity-0');
            setTimeout(() => { toast.classList.add('-translate-y-20', 'opacity-0'); }, 3000);
        }

        // ==========================================
        // 🚀 API 管線邏輯 (V8.1 全體閉環真實串接)
        // ==========================================
        
        // --- Step 1: 點擊第一步：送出主題，生成腳本草稿 ---
        document.agentForm = document.getElementById('agentForm');
        document.agentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnStep1Submit');
            const btnText = document.getElementById('btnTextStep1');
            
            // 防呆與解析度選擇
            const topic = document.getElementById('topic').value.trim();
            if (!topic) return showToast('❌ 請輸入主題！', 'error');

            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-gray-500');
            btnText.innerText = '🧠 大腦正在思考腳本 (約10秒)...';
            
            // 組裝 Payload
            const payload = {
                platform: document.getElementById('platform').value,
                topic: topic,
                isComicMode: isComicModeActive,
                aspectRatio: document.getElementById('aspectRatioSelect').value,
                style: document.getElementById('comicStyleSelect').value,
                resolution: document.getElementById('resolutionSelect').value,
                comicCharacters: [], // 用來讓文字大腦認識角色個性
                image_options: { referenceImages: [] } // DNA 資產包
            };

            // 處理角色 DNA
            const charItems = document.querySelectorAll('#characterList .char-item');
            for (let item of charItems) {
                if (payload.comicCharacters.length >= 4) break; 
                const name = item.querySelector('[name="charName"]').value.trim();
                if (!name) continue;
                
                // 加入個性設定供文字生成參考
                payload.comicCharacters.push({ name, persona: "" });
                
                // 上傳照片 DNA (如果有的話)
                const fileInput = item.querySelector('[name="charAvatar"]');
                const base64Img = await processFileToBase64(fileInput.files[0]);
                if (base64Img) payload.image_options.referenceImages.push({ type: 'character', name, ...base64Img });
            }

            // 處理參考圖 DNA
            const sceneFiles = document.getElementById('referenceImagesInput').files;
            for (let i = 0; i < Math.min(sceneFiles.length, 10); i++) {
                const base64Img = await processFileToBase64(sceneFiles[i]);
                if (base64Img) payload.image_options.referenceImages.push({ type: 'scene_object', ...base64Img });
            }

            try {
                // 📡 呼叫後端 API 1: Draft
                const response = await fetch(`${CLOUD_RUN_URL}/api/content/draft`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${globalAuthToken}` },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (!response.ok || !result.success) throw new Error(result.message || "草稿生成失敗");

                // ✅ 成功取得腳本 JSON
                currentTaskId = result.taskId; // 🌟 記住任務 ID！
                const draft = result.draftContent;

                // 切換畫面
                document.getElementById('step1-setup').classList.add('hidden');
                document.getElementById('step2-review').classList.remove('hidden');
                
                // 填入資料讓總編可以在網頁上修改
                document.getElementById('reviewCaption').value = draft.post_caption;
                
                const panelsContainer = document.getElementById('reviewPanelsContainer');
                if (result.isComicMode && draft.panels) {
                    panelsContainer.classList.remove('hidden');
                    // 🌟 終極淨化版：移除危險的 data-action，只留下乾淨的 textarea
                    let panelsHtml = '<label class="block text-sm font-bold text-gray-700 mb-1">漫畫分鏡台詞 (請修改要印在圖上的中文對白)</label>';
                    draft.panels.forEach(p => {
                        panelsHtml += `
                        <div class="mb-2 p-2 bg-gray-100 rounded-lg border border-gray-200">
                            <textarea id="panel_${p.panel_number}" class="w-full p-2 bg-white border border-gray-300 rounded-lg text-sm font-bold text-blue-800 shadow-sm focus:ring-blue-500" rows="2">${p.dialogue}</textarea>
                        </div>`;
                    });
                    panelsContainer.innerHTML = panelsHtml;
                } else {
                    panelsContainer.classList.add('hidden'); // 商業模式不顯示分鏡
                }
                showToast('✅ 腳本生成完畢，請進行最終確認或修改！', 'success');
                window.scrollTo(0, 0); // 捲動到頂部

            } catch (error) {
                console.error(error);
                showToast(`❌ 發生錯誤: ${error.message}`, 'error');
            } finally {
                // 恢復按鈕
                btn.disabled = false;
                btn.classList.replace('bg-gray-500', 'bg-blue-600');
                btnText.innerText = '⚡ 1️⃣ 第一步：AI 撰寫貼文腳本';
            }
        });

        function backToStep1() {
            document.getElementById('step2-review').classList.add('hidden');
            document.getElementById('step1-setup').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // --- Step 2: 點擊第二步：核准網頁修改後的腳本，發包 Imagen 3 生圖 ---
        async function submitForImageGeneration() {
            const btn = document.getElementById('btnStep2Submit');
            const btnText = document.getElementById('btnTextStep2');
            
            btn.disabled = true;
            btnText.innerText = '🎨 正在極速生圖中 (呼叫 Imagen 3 引擎，約15秒)...';
            
            // 抓取網頁上修改過的文案與台詞
            const editedCaption = document.getElementById('reviewCaption').value;
            const editedPanels = [];
            
            // 確保你的 submitForImageGeneration 裡面是這樣抓資料的：
            if (isComicModeActive) {
                for(let i=1; i<=4; i++) {
                    const ta = document.getElementById(`panel_${i}`);
                    if(ta) {
                        // 🌟 網頁端現在只負責傳送乾淨的台詞！
                        editedPanels.push({
                            panel_number: i,
                            dialogue: ta.value
                        });
                    }
                }
            }

            try {
                // 📡 呼叫後端 API 2: Generate
                const response = await fetch(`${CLOUD_RUN_URL}/api/content/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${globalAuthToken}` },
                    body: JSON.stringify({
                        taskId: currentTaskId,
                        editedCaption: editedCaption,
                        editedPanels: editedPanels // 將修改後的台詞塞給 Imagen 3
                    })
                });
                const result = await response.json();

                if (!response.ok || !result.success) throw new Error(result.message || "生圖失敗");

                // ✅ 成功取得 GCS 圖片網址
                document.getElementById('step2-review').classList.add('hidden');
                document.getElementById('step3-publish').classList.remove('hidden');
                
                // 🌟 顯示真實生成的圖片！
                document.getElementById('finalImageContainer').innerHTML = `
                    <img src="${result.imageUrl}" class="w-full h-auto object-cover rounded-xl shadow-md border border-gray-200 animate-fade-in">`;
                document.getElementById('finalCaptionDisplay').innerText = editedCaption;
                showToast('✅ 圖片生成完畢！請過目！', 'success');
                window.scrollTo(0, 0);

            } catch (error) {
                console.error(error);
                showToast(`❌ 生圖失敗: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btnText.innerText = '🎨 2️⃣ 第二步：發包生成圖片';
            }
        }

        // --- Step 3: 點擊第三步：一鍵發射至社群 ---
        async function publishToSocial() {
            const btn = document.getElementById('btnPublish');
            btn.disabled = true;
            btn.innerHTML = '🚀 正在發射至 Meta 宇宙...';
            
            try {
                // 📡 呼叫後端 API 3: Publish
                const response = await fetch(`${CLOUD_RUN_URL}/api/content/publish`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${globalAuthToken}` },
                    body: JSON.stringify({ taskId: currentTaskId }) // 只需任務 ID
                });
                const result = await response.json();

                if (!response.ok || !result.success) throw new Error(result.message || "發布失敗");

                // ✅ 成功發布
                btn.innerHTML = '✅ 發布成功！圓滿達成！';
                btn.classList.replace('bg-green-600', 'bg-gray-500');
                document.getElementById('btnRegenerate').classList.add('hidden'); // 隱藏生圖按鈕
                showToast('🎉 圖文已成功飛上社群平台！快去檢查！', 'success');
                
                // 📡 這時你身邊的 Telegram 會收到戰報！

            } catch (error) {
                console.error(error);
                showToast(`❌ 發佈失敗: ${error.message}`, 'error');
                btn.disabled = false;
                btn.innerHTML = '🚀 重試：發射至社群';
            }
        }
    </script>
</body>

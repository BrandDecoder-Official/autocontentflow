<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BrandDecoder | 企業級 AI 代理人指揮艙</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/zh.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #0f172a; /* 配合 v9 的深色太空艙主題 (slate-900) */
            color: #f8fafc;
            /* 底部留白，避免被 fixed 的 Agent 懸浮對話框遮擋 */
            padding-bottom: 120px; 
            overflow-x: hidden;
        }

        /* v9 共用的自定義滾動條 */
        .scrollbar-indigo::-webkit-scrollbar { width: 6px; }
        .scrollbar-indigo::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .scrollbar-indigo::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* v9 UI 動畫 */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }

        /* iOS 安全區底部留白 (針對 Agent 對話框) */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1rem); }
    </style>
</head>
<body class="antialiased flex flex-col items-center">

    <div id="loginScreen" class="w-full max-w-md mt-20 flex flex-col items-center bg-slate-800/80 backdrop-blur-md p-10 rounded-3xl shadow-2xl border border-indigo-500/30 transition-all duration-500">
        <div class="text-6xl mb-4 animate-bounce">🤖</div>
        <h1 class="text-3xl font-black text-white mb-2">系統登入</h1>
        <p class="text-indigo-300 mb-8 text-center font-medium text-sm">BrandDecoder 企業級 Agent</p>
        <div id="googleButtonDiv"></div>
        <div id="loginMessage" class="text-center text-sm text-slate-400 mt-4 transition-all duration-300"></div>
    </div>

    <div id="mainApp" class="w-full max-w-5xl hidden transition-all duration-500 opacity-0 relative mx-auto px-4 mt-4 lg:mt-8">
        
        <header class="flex justify-between items-center bg-slate-800/50 backdrop-blur-md border border-white/10 p-4 rounded-2xl shadow-lg mb-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-xl shadow-[0_0_15px_rgba(79,70,229,0.5)]">🪐</div>
                <div>
                    <h1 class="text-sm font-black text-white leading-tight">BrandDecoder</h1>
                    <p class="text-[10px] text-indigo-400 font-bold tracking-widest">AGENT COMMAND CENTER</p>
                </div>
            </div>
            <div class="flex gap-2 items-center">
                <div class="bg-slate-900 border border-indigo-500/30 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-inner">
                    <span class="text-xs text-slate-400 font-bold">⚡ 算力</span>
                    <span id="userPoints" class="text-sm font-black text-yellow-400 tabular-nums">--</span>
                </div>
                <button onclick="window.openCharManager()" class="bg-slate-700 hover:bg-slate-600 text-white w-8 h-8 rounded-lg flex items-center justify-center text-sm transition-colors border border-white/10" title="管理基因庫">🧬</button>
            </div>
        </header>

        <div id="funnelLog" class="w-full pb-8"></div>

    </div>

    <div id="charManageModal" class="fixed inset-0 z-[10000] hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onclick="window.closeCharManager()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-sm bg-slate-900 border-l border-white/10 shadow-2xl flex flex-col transform translate-x-full transition-transform duration-300">
            <div class="p-5 border-b border-white/10 flex justify-between items-center bg-slate-800">
                <h3 class="text-sm font-black text-white flex items-center gap-2"><span>🧬</span> 專屬數位基因庫</h3>
                <button onclick="window.closeCharManager()" class="text-slate-400 hover:text-white text-xl font-bold">&times;</button>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 scrollbar-indigo">
                <div id="btnAddNewCharContainer" class="mb-4">
                    <button onclick="window.openNewCharForm()" class="w-full py-3 border-2 border-dashed border-indigo-500/50 text-indigo-400 rounded-xl hover:bg-indigo-900/20 font-bold text-xs transition-colors">+ 註冊新專屬角色</button>
                </div>
                <div id="charGridContainer" class="grid grid-cols-3 gap-3"></div>

                <div id="newCharForm" class="hidden bg-slate-800 p-4 rounded-xl border border-indigo-500/30 mt-2 space-y-4">
                    <h4 class="text-xs font-black text-indigo-400 border-b border-white/10 pb-2">新增基因檔案</h4>
                    <div class="flex justify-center">
                        <div class="relative w-20 h-20 bg-slate-900 rounded-full border-2 border-dashed border-indigo-400 flex flex-col items-center justify-center cursor-pointer overflow-hidden group" onclick="document.getElementById('newCharInput').click()">
                            <span id="charPreviewEmpty" class="text-[10px] text-indigo-400 font-bold group-hover:scale-110 transition-transform">上傳照片</span>
                            <img id="charPreviewImg" class="absolute inset-0 w-full h-full object-cover hidden z-10">
                            <input type="file" id="newCharInput" accept="image/*" class="hidden" onchange="window.handleCharPhotoSelect(event)">
                        </div>
                    </div>
                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">角色名稱 (必填)</label><input type="text" id="newCharName" placeholder="例如: 總編老K" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-xs text-white outline-none focus:border-indigo-500"></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">宇宙歸屬</label><select id="newCharType" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-xs text-white outline-none focus:border-indigo-500"><option value="COMIC">動漫宇宙 (2D)</option><option value="REALISTIC">真實攝影 (3D)</option></select></div>
                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">外觀指令微調 (選填)</label><input type="text" id="newCharPersona" placeholder="例如: 穿著黑色西裝, 戴眼鏡" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-xs text-white outline-none focus:border-indigo-500"></div>
                    <div class="flex gap-2 pt-2"><button onclick="window.cancelNewChar()" class="flex-1 bg-slate-700 text-white py-2 rounded-lg text-xs font-bold hover:bg-slate-600">取消</button><button id="btnSubmitNewChar" onclick="window.submitNewChar()" class="flex-[2] bg-indigo-600 text-white py-2 rounded-lg text-xs font-black shadow-lg">上傳並萃取基因</button></div>
                </div>
            </div>
            
            <div class="p-4 bg-slate-800 border-t border-white/10">
                <button onclick="window.refreshAuditLogs(); document.getElementById('auditLogsContainer').classList.toggle('hidden');" class="w-full py-2 bg-slate-700 text-slate-300 rounded-lg text-xs font-bold hover:bg-slate-600 transition-colors flex justify-between items-center px-4"><span>📜 查看算力帳單</span><span>▼</span></button>
                <div id="auditLogsContainer" class="hidden mt-2 max-h-40 overflow-y-auto scrollbar-indigo bg-slate-900 rounded-lg p-2 border border-white/5 shadow-inner"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 transition-all duration-300 bg-red-600 text-white px-6 py-3 rounded-full shadow-[0_0_20px_rgba(220,38,38,0.6)] font-bold flex items-center z-[11000] text-sm whitespace-nowrap">
        <span id="toastMsg">系統錯誤</span>
    </div> 

    <script type="module" src="/js/main.js"></script>

    <script>
        // 監聽 DOM 變化，用來給側欄加上滑出動畫
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.target.id === 'charManageModal') {
                    const panel = mutation.target.querySelector('.transform');
                    if (mutation.target.classList.contains('show')) {
                        panel.classList.remove('translate-x-full');
                    } else {
                        panel.classList.add('translate-x-full');
                    }
                }
            });
        });
        document.addEventListener("DOMContentLoaded", () => {
            const modal = document.getElementById('charManageModal');
            if (modal) observer.observe(modal, { attributes: true, attributeFilter: ['class'] });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandDecoder | AI 內容指揮中心 V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .mode-active { border-color: #3b82f6 !important; background-color: #eff6ff !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .char-item { border: 1px solid #e5e7eb; padding: 16px; border-radius: 12px; margin-bottom: 12px; background: #ffffff; transition: all 0.3s ease; }
        .char-item:hover { border-color: #bfdbfe; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col items-center py-10 px-4">

    <div id="loginScreen" class="w-full max-w-md mt-20 flex flex-col items-center glass-card p-10 rounded-3xl shadow-xl border border-gray-200 transition-all duration-500">
        <div class="text-6xl mb-4">🤖</div>
        <h1 class="text-3xl font-black text-gray-900 mb-2">系統登入</h1>
        <p class="text-gray-500 mb-8 text-center font-medium">BrandDecoder 私有 AI 自動化生成流</p>
        <div id="googleButtonDiv"></div>
    </div>

    <div id="mainApp" class="w-full max-w-5xl hidden transition-all duration-500 opacity-0">
        
        <div class="w-full mb-8 text-center">
            <h1 class="text-4xl font-black text-gray-900 tracking-tight mb-2">🚀 BrandDecoder <span class="text-blue-600">AI 總機 V5</span></h1>
            <p class="text-gray-500 font-medium">全能商務合成 ✕ 動漫 IP 工廠 ✕ 真人角色鎖定</p>
        </div>

        <form id="agentForm" class="w-full space-y-6">
            
            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">📡 靈感與主題來源</label>
                        <select id="sourceType" onchange="switchSource(this.value)" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl block p-3 font-medium transition-colors cursor-pointer focus:ring-blue-500 focus:border-blue-500">
                            <option value="manual" selected>✍️ 手動輸入主題 (企劃生成)</option>
                            <option value="auto_rss">🤖 自動抓取時事 (RSS 爬蟲)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">🎯 目標平台</label>
                        <select id="platform" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl block p-3 font-medium transition-colors cursor-pointer focus:ring-blue-500 focus:border-blue-500">
                            <option value="FB_IG" selected>🌐 FB + IG 雙平台</option>
                            <option value="FB">📘 僅限 Facebook</option>
                            <option value="IG">📸 僅限 Instagram</option>
                            <option value="THREADS">🧵 僅限 Threads</option>
                        </select>
                    </div>
                </div>

                <div id="sourceManual" class="mt-5 animate-fade-in">
                    <textarea id="topic" rows="3" placeholder="請輸入主題，例如：老K吃到美味烤雞串後的搞笑反應..." class="block p-4 w-full text-gray-900 bg-white rounded-xl border border-gray-300 focus:ring-blue-500 focus:border-blue-500 font-medium resize-none shadow-inner"></textarea>
                </div>

                <div id="sourceAutoRSS" class="hidden mt-5 animate-fade-in p-5 bg-blue-50 rounded-xl border border-blue-200">
                    <label class="block text-sm font-bold text-blue-900 mb-2">追蹤關鍵字 (例：人工智慧, 房地產)</label>
                    <input type="text" id="rssKeyword" placeholder="請輸入關鍵字" class="w-full bg-white border border-blue-300 text-gray-900 rounded-lg p-3 font-medium focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center border-b pb-3">
                    <span class="bg-gray-100 p-2 rounded-lg mr-3">🧠</span> 選擇大腦生成模式與畫風
                </h2>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div id="btnComicMode" class="mode-active border-2 border-gray-200 rounded-xl p-4 cursor-pointer text-center transition-all hover:bg-gray-50" onclick="switchMode(true)">
                        <div class="text-3xl mb-2">🦸‍♂️</div>
                        <div class="font-bold text-gray-800 text-lg">動漫 IP 宇宙</div>
                        <div class="text-sm text-gray-500 mt-1">四格漫畫、幽默吐槽</div>
                    </div>
                    <div id="btnStandardMode" class="border-2 border-gray-200 rounded-xl p-4 cursor-pointer text-center transition-all hover:bg-gray-50" onclick="switchMode(false)">
                        <div class="text-3xl mb-2">📸</div>
                        <div class="font-bold text-gray-800 text-lg">商業實境應用</div>
                        <div class="text-sm text-gray-500 mt-1">專業商品、風景合成</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-5 bg-gray-50 rounded-xl border border-gray-200">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">📐 圖片比例</label>
                        <select id="aspectRatioSelect" class="w-full bg-white border border-gray-300 text-gray-900 rounded-lg p-3 font-medium cursor-pointer">
                            <option value="1:1" selected>1:1 (正方形 - 預設)</option>
                            <option value="16:9">16:9 (橫式影片)</option>
                            <option value="9:16">9:16 (直式短影音)</option>
                            <option value="1:4">1:4 (直式長條漫)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">🎨 畫風設定字典</label>
                        <select id="comicStyleSelect" class="w-full bg-white border border-gray-300 text-gray-900 rounded-lg p-3 font-medium cursor-pointer">
                            <option value="TORIYAMA_HUMOR" selected>🥚 鳥山明爆笑風 (黑白預設)</option>
                            <option value="GHIBLI">🍃 吉卜力溫馨風 (彩色)</option>
                            <option value="RETRO_HOKUTO_BW">⬛ 世紀末硬派黑白風</option>
                            <option value="REALISTIC">📸 超逼真商業攝影模式</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="characterSection" class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-6">
                    <h2 class="text-xl font-bold text-gray-800 flex items-center mb-4 md:mb-0">
                        <span class="bg-gray-100 p-2 rounded-lg mr-3">👥</span> 登場角色 DNA 管理
                    </h2>
                    <button type="button" onclick="addCharacterSlot()" class="bg-blue-600 text-white text-sm font-bold px-4 py-2 rounded-lg hover:bg-blue-700 transition-all shadow-sm">
                        + 加入新角色
                    </button>
                </div>

                <div id="characterList" class="space-y-4"></div>
                
                <div class="mt-6 flex items-center p-4 bg-gray-50 border border-gray-200 rounded-xl">
                    <input id="noCharacterMode" type="checkbox" onchange="toggleNoCharacterMode(this.checked)" class="w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                    <label for="noCharacterMode" class="ml-3 text-sm font-bold text-gray-700 cursor-pointer select-none">🚫 本任務不加入任何角色 (切換為純商品/風景攝影模式)</label>
                </div>
            </div>

            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center border-b pb-3">
                    <span class="bg-gray-100 p-2 rounded-lg mr-3">🖼️</span> 額外參考圖 (場景 / 物件)
                </h2>
                <p class="text-sm text-gray-500 mb-4 font-medium">如果您有特定的商品照片、或是希望 AI 參考的場景構圖，請在此上傳。</p>
                <input type="file" id="referenceImagesInput" accept="image/png, image/jpeg, image/webp" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer border border-gray-200 rounded-xl p-2 bg-white">
                <p class="text-xs text-red-500 mt-2 font-bold">* 角色 DNA 圖 + 參考圖，總數請勿超過 10 張。單張限制 < 512KB。</p>
            </div>

            <button type="submit" id="submitBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-black rounded-2xl text-xl px-5 py-5 text-center transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex justify-center items-center">
                <span id="btnText">🚀 執行任務 / 傳送大腦</span>
            </button>
        </form>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl font-bold flex items-center z-50">
        <span id="toastIcon" class="mr-3 text-2xl">ℹ️</span>
        <span id="toastMsg">系統訊息</span>
    </div>

    <script>
        // ⚠️ 請確認這裡是你最新的 Cloud Run 網址
        const CLOUD_RUN_URL = 'https://bd-autocontentflow-217800246535.asia-east1.run.app';
        let isComicModeActive = true; 
        let currentSourceType = 'manual';
        let globalAuthToken = ''; 

        // 登入驗證
        function handleCredentialResponse(response) {
            globalAuthToken = response.credential;
            document.getElementById('loginScreen').classList.add('hidden');
            const mainApp = document.getElementById('mainApp');
            mainApp.classList.remove('hidden');
            setTimeout(() => { mainApp.classList.remove('opacity-0'); }, 100);
            showToast('✅ 登入成功！工廠引擎已發動。', 'success');
        }

        window.onload = function () {
            google.accounts.id.initialize({
                client_id: "217800246535-tuc0olph401jjipa5hm34hq45h9jlq7j.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(document.getElementById("googleButtonDiv"),{ theme: "outline", size: "large", width: 300, shape: "pill" });
            
            // 預設給總編一個老K的位置
            addCharacterSlot("老K", "聰明、科技總編", true);
        };

        // 🌟 角色 DNA 卡片動態生成器
        function addCharacterSlot(name = "", personality = "", isReal = false) {
            const list = document.getElementById('characterList');
            if (list.children.length >= 5) {
                alert("⚠️ 登場角色太多大腦會混亂喔！建議最多 5 人。");
                return;
            }

            const charCard = document.createElement('div');
            charCard.className = 'char-item relative';
            charCard.innerHTML = `
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-3 right-4 text-gray-400 hover:text-red-500 font-bold text-xl" title="移除角色">✕</button>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-4">
                        <label class="block text-sm font-bold text-gray-700 mb-1">本名 (必填)</label>
                        <input type="text" name="charName" value="${name}" placeholder="例：老K" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 font-bold focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div class="md:col-span-8">
                        <label class="block text-sm font-bold text-gray-700 mb-1">角色個性/設定</label>
                        <input type="text" name="charPersona" value="${personality}" placeholder="例：幽默、容易受驚嚇" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 font-medium focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="md:col-span-12 mt-2">
                        <label class="block text-sm font-bold text-blue-700 mb-1">🔗 上傳 DNA 照片 (若要鎖定長相請上傳)</label>
                        <input type="file" name="charAvatar" accept="image/png, image/jpeg, image/webp" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-bold file:bg-blue-100 file:text-blue-700 hover:file:bg-blue-200 border border-blue-200 rounded-xl p-1 bg-blue-50 cursor-pointer">
                    </div>
                </div>
            `;
            list.appendChild(charCard);
        }

        // 禁用角色清單
        function toggleNoCharacterMode(checked) {
            const list = document.getElementById('characterList');
            list.style.opacity = checked ? '0.4' : '1';
            list.style.pointerEvents = checked ? 'none' : 'auto';
        }

        // 切換模式 (動漫/商業)
        function switchMode(toComic) {
            isComicModeActive = toComic;
            const btnStandard = document.getElementById('btnStandardMode');
            const btnComic = document.getElementById('btnComicMode');
            const charSection = document.getElementById('characterSection');
            const styleSelect = document.getElementById('comicStyleSelect');

            if (toComic) {
                btnComic.classList.add('mode-active');
                btnStandard.classList.remove('mode-active');
                charSection.classList.remove('hidden');
                if (styleSelect.value === 'REALISTIC') styleSelect.value = 'TORIYAMA_HUMOR';
            } else {
                btnStandard.classList.add('mode-active');
                btnComic.classList.remove('mode-active');
                charSection.classList.add('hidden'); 
                styleSelect.value = 'REALISTIC'; 
            }
        }

        // 切換來源 (手動/RSS)
        function switchSource(type) {
            currentSourceType = type;
            const manual = document.getElementById('sourceManual');
            const rss = document.getElementById('sourceAutoRSS');
            const submitText = document.getElementById('btnText');

            if (type === 'manual') {
                manual.classList.remove('hidden');
                rss.classList.add('hidden');
                submitText.innerText = '🚀 執行任務 / 傳送大腦';
            } else {
                rss.classList.remove('hidden');
                manual.classList.add('hidden');
                submitText.innerText = '📡 發送 RSS 排程規則';
            }
        }

        // 🌟 圖片轉 Base64 核心引擎 (防呆防超載)
        async function processFileToBase64(file) {
            if (!file || file.size === 0) return null;
            if (file.size > 512 * 1024) {
                alert(`❌ 圖片 [${file.name}] 太大了 (超過 512KB)，大腦吃不下，已自動忽略！`);
                return null;
            }
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve({ mimeType: file.type, data: reader.result.split(',')[1] });
                reader.onerror = e => reject(e);
            });
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.backgroundColor = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#3b82f6');
            toast.classList.remove('translate-y-20', 'opacity-0');
            if (type !== 'info') setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 5000);
        }

        // ==========================================
        // 🚀 API 發送與組裝資料邏輯
        // ==========================================
        document.agentForm = document.getElementById('agentForm');
        document.agentForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            btn.disabled = true;
            btnText.innerText = '⚙️ 正在打包 DNA 與設定檔...';

            const payload = {
                platform: document.getElementById('platform').value,
                sourceType: currentSourceType,
                isComicMode: isComicModeActive,
                aspectRatio: document.getElementById('aspectRatioSelect').value,
                style: document.getElementById('comicStyleSelect').value,
                resolution: '2K' 
            };

            // 1. 文字主題
            if (currentSourceType === 'manual') {
                const topic = document.getElementById('topic').value.trim();
                if (!topic) return restoreUI('請輸入主題！');
                payload.topic = topic;
            } else {
                payload.rssKeyword = document.getElementById('rssKeyword').value.trim();
                if (!payload.rssKeyword) return restoreUI('請輸入 RSS 關鍵字！');
            }

            // 2. 收集圖片與角色 DNA
            const isNoCharMode = document.getElementById('noCharacterMode').checked;
            let referenceImages = []; 

            if (isComicModeActive && !isNoCharMode) {
                const charItems = document.querySelectorAll('#characterList .char-item');
                payload.comicCharacters = []; 

                for (let item of charItems) {
                    const name = item.querySelector('[name="charName"]').value.trim();
                    if (!name) continue; 
                    const persona = item.querySelector('[name="charPersona"]').value.trim();
                    
                    const fileInput = item.querySelector('[name="charAvatar"]');
                    const base64Img = fileInput.files.length > 0 ? await processFileToBase64(fileInput.files[0]) : null;

                    payload.comicCharacters.push({ name, persona });

                    if (base64Img) {
                        referenceImages.push({
                            type: 'character', 
                            name: name,
                            mimeType: base64Img.mimeType,
                            data: base64Img.data
                        });
                    }
                }
            } else {
                payload.comicCharacters = []; 
            }

            // 3. 收集場景物件圖
            const sceneFiles = document.getElementById('referenceImagesInput').files;
            if (sceneFiles.length > 0) {
                if (referenceImages.length + sceneFiles.length > 10) {
                    alert(`⚠️ 總圖片超過 10 張！系統將自動捨棄多餘的照片。`);
                }
                for (let i = 0; i < Math.min(sceneFiles.length, (10 - referenceImages.length)); i++) {
                    const base64Img = await processFileToBase64(sceneFiles[i]);
                    if (base64Img) {
                        referenceImages.push({
                            type: 'scene_object',
                            mimeType: base64Img.mimeType,
                            data: base64Img.data
                        });
                    }
                }
            }
            
            payload.image_options = {
                aspectRatio: payload.aspectRatio,
                resolution: payload.resolution,
                style: payload.style,
                referenceImages: referenceImages 
            };

            btn.classList.replace('bg-blue-600', 'bg-gray-500');
            btnText.innerText = '🧠 傳送至雲端大腦...';

            try {
                const response = await fetch(`${CLOUD_RUN_URL}/api/content/draft`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${globalAuthToken}` },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.success) showToast('✅ 任務處理成功！請查看 Telegram', 'success');
                else throw new Error(result.message);
            } catch (error) {
                console.error(error);
                showToast(`發生錯誤: ${error.message}`, 'error');
            } finally {
                restoreUI('🚀 執行任務 / 傳送大腦');
            }

            function restoreUI(text) {
                btn.disabled = false;
                btn.classList.replace('bg-gray-500', 'bg-blue-600');
                btnText.innerText = text;
            }
        });
    </script>
</body>
</html>

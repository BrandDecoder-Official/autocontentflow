                        </select>

            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

                            <label class="flex items-center bg-white py-2 px-4 border border-pink-200 rounded-lg cursor-pointer hover:bg-pink-100 shadow-sm font-bold text-gray-700">
                                <input type="checkbox" name="comicCharacters" value="AH_QI" class="mr-2 w-4 h-4 text-pink-500 focus:ring-pink-400" checked> 阿淇 (吐槽役)

                            <label class="flex items-center bg-white py-2 px-4 border border-pink-200 rounded-lg cursor-pointer hover:bg-pink-100 shadow-sm font-bold text-gray-700">
                                <input type="checkbox" name="comicCharacters" value="GENERAL_MANAGER" class="mr-2 w-4 h-4 text-pink-500 focus:ring-pink-400"> 總經理 (魔王)

                        <label class="block text-sm font-bold text-pink-900 mb-3">🎨 漫畫視覺畫風</label>
                        <select id="comicStyle" class="w-full bg-white border border-pink-300 text-pink-900 rounded-lg p-3 font-bold cursor-pointer shadow-sm">
                            
                            <optgroup label="🔥 日漫熱血/經典系列">

                                <option value="ONE_PIECE">🏴‍☠️ 航海王冒險風</option>

                                <option value="MARUKO">🎒 櫻桃小丸子風</option>
                                <option value="CHIIKAWA">🥺 吉伊卡哇療癒風</option>
                                <option value="SUMIKKO">🍵 角落生物風</option>
                            </optgroup>

                            <optgroup label="🎬 美式/3D 動畫系列">
                                <option value="PIXAR">🧸 皮克斯 3D 質感風</option>
                                <option value="FROZEN">❄️ 冰雪奇緣美學</option>
                                <option value="SIMPSONS">🍩 辛普森家庭風</option>
                                <option value="SOUTH_PARK">🤬 南方四賤客風</option>

            <div class="glass-card rounded-2xl shadow-sm border border-gray-200 p-6 md:p-8">

                    <span class="bg-gray-100 p-2 rounded-lg mr-3">🖼️</span> 進階生圖設定 (Gemini 3.1)
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">📐 圖片比例</label>
                        <select id="aspectRatioSelect" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 font-medium transition-colors cursor-pointer">
                            <option value="1:1" selected>1:1 (正方形 - 預設)</option>

                            <option value="1:4">1:4 (直式長圖)</option>

                            <option value="1:8">1:8 (極限長條漫)</option>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">🔍 解析度</label>
                        <select id="resolutionSelect" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3 font-medium transition-colors cursor-pointer">
                            <option value="512">512 (0.5K - 快速預覽)</option>
                            <option value="1K">1K</option>
                            <option value="2K" selected>2K (標準高畫質)</option>
                            <option value="4K">4K (極致畫質)</option>

                    </div>
                </div>
                <div class="mt-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">📥 上傳參考圖 (最多14張，單張必須 < 512KB)</label>
                    <input type="file" id="referenceImagesInput" accept="image/png, image/jpeg, image/webp" multiple class="block w-full text-sm text-gray-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 transition-all cursor-pointer border border-gray-200 rounded-xl p-2 bg-white">
                    <p class="text-xs text-gray-500 mt-2 font-medium">💡 可上傳角色設定圖、畫風參考圖，Gemini 3.1 引擎將自動提取 DNA 進行合成。</p>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-black rounded-2xl text-xl px-5 py-5 text-center transition-all shadow-lg hover:shadow-xl transform hover:-translate-y-1 flex justify-center items-center">
                <span id="btnText">🚀 執行任務 / 儲存排程</span>
            </button>
        </form>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-900 text-white px-6 py-4 rounded-xl shadow-2xl font-bold flex items-center z-50">
        <span id="toastIcon" class="mr-3 text-2xl">ℹ️</span>
        <span id="toastMsg">系統訊息</span>
    </div>

    <script>
        // 🌐 Cloud Run 伺服器網址
        const CLOUD_RUN_URL = 'https://bd-autocontentflow-217800246535.asia-east1.run.app';
        let isComicModeActive = false;
        let currentSourceType = 'manual'; // 追蹤目前是手動還是 RSS 模式
        let globalAuthToken = ''; 

        // ==========================================
        // 🛡️ Google 登入核心邏輯
        // ==========================================
        function handleCredentialResponse(response) {
            globalAuthToken = response.credential;
            document.getElementById('loginScreen').classList.add('hidden');
            const mainApp = document.getElementById('mainApp');
            mainApp.classList.remove('hidden');
            setTimeout(() => { mainApp.classList.remove('opacity-0'); }, 100);
            showToast('✅ 登入成功！身分驗證完畢。', 'success');
        }

        window.onload = function () {
            google.accounts.id.initialize({
                // 👇 🚨 記得換回你的 Client ID 🚨 👇
                client_id: "217800246535-tuc0olph401jjipa5hm34hq45h9jlq7j.apps.googleusercontent.com", 
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("googleButtonDiv"),
                { theme: "outline", size: "large", width: 300, shape: "pill" }
            );
        };

        // ==========================================
        // 🖼️ 圖片壓縮與 Base64 轉換神經
        // ==========================================
        async function processReferenceImages(fileInputId) {
            const fileInput = document.getElementById(fileInputId);
            const files = fileInput.files;
            let processedImages = [];

            if (files.length > 14) {
                showToast("⚠️ 參考圖最多只能上傳 14 張！系統自動擷取前 14 張。", "error");
            }

            const maxFiles = Math.min(files.length, 14);

            for (let i = 0; i < maxFiles; i++) {
                const file = files[i];
                
                // 檢查大小 (512KB)
                if (file.size > 512 * 1024) {
                    alert(`❌ 圖片 [${file.name}] 超過 512KB 限制，已自動忽略！請縮小後再上傳。`);
                    continue; 
                }

                try {
                    const base64Data = await convertFileToBase64(file);
                    processedImages.push({
                        mimeType: file.type,
                        data: base64Data.split(',')[1] // 只取 data 部分
                    });
                } catch (err) {
                    console.error("圖片轉檔失敗", err);
                }
            }
            return processedImages;
        }

        function convertFileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ==========================================
        // 🎨 UI 介面切換邏輯
        // ==========================================
        function switchMode(toComic) {
            isComicModeActive = toComic;
            const btnStandard = document.getElementById('btnStandardMode');
            const btnComic = document.getElementById('btnComicMode');
            const standardSettings = document.getElementById('standardSettings');
            const comicSettings = document.getElementById('comicSettings');

            if (toComic) {
                btnComic.classList.add('mode-active');
                btnStandard.classList.remove('mode-active');
                comicSettings.classList.remove('hidden');
                standardSettings.classList.add('hidden');
            } else {
                btnStandard.classList.add('mode-active');
                btnComic.classList.remove('mode-active');
                standardSettings.classList.remove('hidden');
                comicSettings.classList.add('hidden');
            }
        }

        function switchSource(type) {
            currentSourceType = type;
            const tabManual = document.getElementById('tabManual');
            const tabAutoRSS = document.getElementById('tabAutoRSS');
            const sourceManual = document.getElementById('sourceManual');
            const sourceAutoRSS = document.getElementById('sourceAutoRSS');

            if (type === 'manual') {
                tabManual.classList.add('bg-white', 'shadow', 'text-blue-600');
                tabManual.classList.remove('text-gray-500');
                tabAutoRSS.classList.remove('bg-white', 'shadow', 'text-blue-600');
                tabAutoRSS.classList.add('text-gray-500');
                sourceManual.classList.remove('hidden');
                sourceAutoRSS.classList.add('hidden');
            } else {
                tabAutoRSS.classList.add('bg-white', 'shadow', 'text-blue-600');
                tabAutoRSS.classList.remove('text-gray-500');
                tabManual.classList.remove('bg-white', 'shadow', 'text-blue-600');
                tabManual.classList.add('text-gray-500');
                sourceAutoRSS.classList.remove('hidden');
                sourceManual.classList.add('hidden');
            }
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMsg.innerText = msg;
            if (type === 'success') { toastIcon.innerText = '✅'; toast.style.backgroundColor = '#10b981'; }
            else if (type === 'error') { toastIcon.innerText = '❌'; toast.style.backgroundColor = '#ef4444'; }
            else { toastIcon.innerText = '⏳'; toast.style.backgroundColor = '#3b82f6'; }

            toast.classList.remove('translate-y-20', 'opacity-0');
            if (type !== 'info') setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 5000);
        }

        // ==========================================
        // 🚀 API 發送邏輯 (結合影像進階參數)
        // ==========================================
        document.getElementById('agentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');

            // 🌟 1. 啟動圖片處理神經 (讀取檔案轉 Base64)
            btn.disabled = true;
            btnText.innerText = '⚙️ 正在處理參考圖片...';
            const refImages = await processReferenceImages('referenceImagesInput');

            // 2. 基礎 Payload 打包
            const payload = {
                client: document.getElementById('client').value,
                platform: document.getElementById('platform').value,
                mentionBrand: document.getElementById('mentionBrand').checked,
                sourceType: currentSourceType 
            };

            // 🌟 3. 將進階生圖設定打包進去
            payload.image_options = {
                aspectRatio: document.getElementById('aspectRatioSelect').value,
                resolution: document.getElementById('resolutionSelect').value,
                referenceImages: refImages // 最多14張經過處理的圖片
            };

            // 4. 根據資料來源打包
            if (currentSourceType === 'manual') {
                const topic = document.getElementById('topic').value.trim();
                if (!topic) {
                    btn.disabled = false;
                    btnText.innerText = '🚀 執行任務 / 儲存排程';
                    return showToast('請輸入企劃主題！', 'error');
                }
                payload.topic = topic;
            } else {
                const keyword = document.getElementById('rssKeyword').value.trim();
                if (!keyword) {
                    btn.disabled = false;
                    btnText.innerText = '🚀 執行任務 / 儲存排程';
                    return showToast('請輸入追蹤關鍵字！', 'error');
                }
                payload.rssConfig = {
                    keyword: keyword,
                    timeframe: document.getElementById('rssTimeframe').value,
                    category: document.getElementById('rssCategory').value
                };
                payload.topic = `[系統自動] 抓取關鍵字: ${keyword} 的最新新聞`; 
            }

            // 5. 根據大腦模式打包
            payload.isComicMode = isComicModeActive;
            if (isComicModeActive) {
                payload.comicCharacters = Array.from(document.querySelectorAll('input[name="comicCharacters"]:checked')).map(cb => cb.value);
                payload.comicStyle = document.getElementById('comicStyle').value;
                if (payload.comicCharacters.length === 0) {
                    btn.disabled = false;
                    btnText.innerText = '🚀 執行任務 / 儲存排程';
                    return showToast('請至少選擇一位登場角色！', 'error');
                }
            } else {
                payload.mediaType = 'image';
                payload.persona = document.getElementById('persona').value;
                payload.ctaGoal = document.getElementById('ctaGoal').value;
                payload.wordLimit = 350; 
            }

            // 鎖定 UI，準備發射
            btn.classList.replace('bg-blue-600', 'bg-gray-500');
            btnText.innerText = currentSourceType === 'manual' ? '🧠 大腦高速運算中，請稍候...' : '⚙️ 正在儲存排程規則...';
            showToast('正在與雲端神經網路連線...', 'info');

            try {
                const response = await fetch(`${CLOUD_RUN_URL}/api/content/draft`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${globalAuthToken}` 
                    },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showToast('✅ 任務處理成功！請查看結果', 'success');
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error(error);
                showToast(`發生錯誤: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.classList.replace('bg-gray-500', 'bg-blue-600');
                btnText.innerText = '🚀 執行任務 / 儲存排程';
            }
        });
    </script>
</body>
</html>
